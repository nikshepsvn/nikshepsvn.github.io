    <meta name="twitter:image" content="https://nikshepsvn.com/og.png" />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ffffff'/%3E%3Ctext x='50%25' y='70%25' font-size='72' font-family='Menlo,monospace' text-anchor='middle' fill='%230a0a0a'%3Ens%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-hero">
            <div class="status">
              <span class="live-dot"></span>
              <span class="status-label">shipping</span>
              <span class="sep">·</span>
              <span id="hero-time">—</span>
            </div>

            <h1 id="hero-name" class="name"></h1>
            <div class="role" id="hero-role"></div>

            <p class="tagline" id="hero-tag"></p>
            <p class="tagline-sub" id="hero-philosophy"></p>
          </div>

          <div class="sidebar-meta">
            <div class="prev">
              <div class="prev-label">Background</div>
              <div class="prev-items" id="prev-items"></div>
            </div>

            <div class="press-side" id="press-side">
              <div class="press-side-label">Featured in</div>
              <div class="press-side-items" id="press-side-items"></div>
            </div>

            <div class="cta">
              <div class="cta-label">Reach me</div>
              <p class="cta-text">
                DMs on <a href="https://twitter.com/nikshepsvn" target="_blank" rel="noreferrer">X</a> are best, or
                <a href="mailto:nikshepsvn@gmail.com" id="cta-email">nikshepsvn@gmail.com</a>.
              </p>
            </div>

            <ul class="links" id="links-list"></ul>

            <div class="sidebar-foot">
              <div class="foot-colo">© <span id="foot-year"></span> Nikshep Saravanan</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="content">
        <section id="ventures" class="section section-ventures">
          <header class="sec">
            <h2>Ventures</h2>
            <span class="sec-count" id="ventures-count"></span>
          </header>
          <div id="ventures-rows" class="vrows"></div>
        </section>

        <section id="work" class="section">
          <header class="sec">
            <h2>Projects</h2>
            <span class="sec-count" id="work-count"></span>
          </header>
          <div id="work-list" class="prows" aria-label="Projects"></div>
        </section>

        <section id="writing" class="section">
          <header class="sec">
            <h2>Writing</h2>
            <span class="sec-count" id="writing-count"></span>
          </header>
          <div id="writing-rows" class="erows"></div>
        </section>

        <section id="press" class="section">
          <header class="sec">
            <h2>Press</h2>
            <span class="sec-count" id="press-count"></span>
          </header>
          <div id="press-rows" class="erows"></div>
        </section>
      </main>
    </div>

    <div id="pmodal" class="pmodal" hidden aria-modal="true" role="dialog">
      <div class="pmodal-backdrop" data-close></div>
      <div class="pmodal-card">
        <button class="pmodal-close" data-close aria-label="Close">✕</button>
        <div class="pmodal-content" id="pmodal-content"></div>
      </div>
    </div>

    <!-- Essay reader (modal) -->
    <div id="reader" class="reader" hidden aria-modal="true" role="dialog" aria-label="Essay reader">
      <div class="reader-backdrop" data-reader-close></div>
      <div class="reader-card">
        <header class="reader-bar">
          <button class="reader-close" data-reader-close aria-label="Close reader">
            <span>← back</span>
          </button>
          <div class="reader-progress" aria-hidden="true">
            <div class="reader-progress-bar" id="reader-progress-bar"></div>
          </div>
          <div class="reader-title" id="reader-title"></div>
        </header>
        <div class="reader-scroll" id="reader-scroll">
          <div class="reader-inner" id="reader-inner"></div>
        </div>
      </div>
    </div>

    <script src="./content.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
